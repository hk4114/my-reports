    <style>
        /* === RESET & BASE === */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            /* Distinct theme colors for cards */
            --theme-0-bg: #EFF6FF; --theme-0-header: #1D4ED8;
            --theme-1-bg: #ECFDF5; --theme-1-header: #047857;
            --theme-2-bg: #F5F3FF; --theme-2-header: #6D28D9;
            --theme-3-bg: #FFFBEB; --theme-3-header: #B45309;
            --theme-4-bg: #ECFEFF; --theme-4-header: #0E7490;
            --theme-5-bg: #FEF2F2; --theme-5-header: #B91C1C;
            --theme-6-bg: #F9FAFB; --theme-6-header: #374151;
            --theme-7-bg: #FFF1F2; --theme-7-header: #BE123C;
            --theme-8-bg: #F0FDF4; --theme-8-header: #15803D;
            --theme-9-bg: #FDF4FF; --theme-9-header: #A21CAF;
            
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
        }
        
        body {
            font-family: var(--font-sans);
            font-size: 14px; /* More compact for cheatsheet */
            line-height: 1.5;
            background: #F3F4F6; /* Light gray background to make cards pop */
            color: #1F2937;
            padding: 24px;
            min-height: 100vh;
        }
        
        .page {
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
        }
        
        /* === HEADER === */
        .header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #D1D5DB;
            gap: 20px;
            flex-wrap: wrap;
        }
        .header-content {
            display: flex; flex-direction: column; gap: 4px;
        }
        .header h1 { font-size: 2.25rem; font-weight: 800; color: #111827; letter-spacing: -0.025em; line-height: 1.1; }
        .header-meta { font-size: 0.95rem; color: #6B7280; font-weight: 500; }
        
        /* === SEARCH === */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 380px;
            margin-bottom: 4px;
        }
        .search-input {
            width: 100%;
            padding: 10px 40px 10px 38px;
            border: 1px solid #E5E7EB;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #1F2937;
            background: #fff;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            font-family: var(--font-sans);
        }
        .search-input::placeholder {
            color: #9CA3AF;
        }
        .search-input:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            background: #fff;
        }
        .search-input:hover:not(:focus) {
            border-color: #D1D5DB;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            color: #9CA3AF;
            pointer-events: none;
            transition: color 0.2s;
        }
        .search-input:focus ~ .search-icon {
            color: #3B82F6;
        }
        .search-shortcut {
            position: absolute;
            right: 10px;
            display: flex;
            align-items: center;
            pointer-events: none;
        }
        .search-shortcut kbd {
            background: #F3F4F6;
            border: 1px solid #E5E7EB;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.75rem;
            color: #6B7280;
            font-family: var(--font-mono);
            font-weight: 600;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        /* HIGHLIGHTING */
        mark {
            background-color: rgba(253, 224, 71, 0.6); /* yellow-300 with opacity */
            color: inherit;
            border-radius: 2px;
            padding: 0 2px;
            margin: 0 -2px;
            font-weight: 600;
            box-shadow: 0 1px 1px rgba(253, 224, 71, 0.4);
        }

        .hidden {
            display: none !important;
        }

        /* Empty state */
        .empty-state {
            display: none;
            column-span: all;
            text-align: center;
            padding: 80px 20px;
            color: #6B7280;
            animation: fadeIn 0.3s ease;
        }
        .empty-state.active {
            display: block;
        }
        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.8;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        .empty-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Responsive Search */
        @media (max-width: 640px) {
            .header { align-items: flex-start; }
            .search-container { max-width: 100%; margin-top: 12px; }
        }

        /* === MASONRY GRID === */
        .masonry-grid {
            column-count: 1;
            column-gap: 20px;
        }
        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1440px) { .masonry-grid { column-count: 4; } }

        /* === SECTION (CARD) === */
        .section {
            break-inside: avoid;
            page-break-inside: avoid;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #E5E7EB;
        }
        
        .section-header {
            padding: 12px 16px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.025em;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .section-content {
            padding: 8px 0;
            display: flex;
            flex-direction: column;
        }
        
        .sub-header {
            font-weight: 700;
            font-size: 0.9rem;
            color: #4B5563;
            padding: 12px 16px 4px 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* === ROW (Left/Right Aligned) === */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 8px 16px;
            border-bottom: 1px solid #F3F4F6;
            gap: 12px;
        }
        .row:last-child { border-bottom: none; }
        .row:hover { background: #F9FAFB; } /* Subtle hover effect for rows */
        
        .key {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 600;
            color: #1F2937;
        }
        
        .key.clickable {
            flex: 0 0 auto;
            max-width: 45%;
            text-align: left;
            color: #2563EB;
            cursor: pointer;
            border: none;
            background: none;
            padding: 2px 4px;
            margin-left: -4px;
            border-radius: 4px;
            transition: all 0.15s;
        }
        .key.clickable:hover, .key.clickable:focus {
            color: #1D4ED8;
            background: rgba(37, 99, 235, 0.1);
            outline: none;
        }
        
        .desc {
            flex: 1;
            font-size: 0.9rem;
            color: #4B5563;
            text-align: right; /* Right align for a clean two-column feel */
            word-break: break-word;
            line-height: 1.4;
        }
        
        code {
            font-family: var(--font-mono); background: #1F2937; color: #F3F4F6;
            padding: 2px 6px; border-radius: 4px; font-size: 0.8rem;
        }

        /* Text blocks inside cards */
        .section-content > p {
            padding: 4px 16px;
            font-size: 0.9rem;
            color: #4B5563;
        }

        /* === MODAL STYLES === */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(17, 24, 39, 0.75); backdrop-filter: blur(2px);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px; opacity: 0; transition: opacity 0.2s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal {
            background: white; border-radius: 12px; 
            max-width: 1200px; width: 100%; max-height: 90vh; 
            overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.95); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-header {
            background: #111827; color: white; padding: 20px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-title { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.025em; }
        .modal-close {
            background: none; border: none; color: #9CA3AF; font-size: 1.75rem; cursor: pointer;
            line-height: 1; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; transition: all 0.15s;
        }
        .modal-close:hover, .modal-close:focus { color: white; background: rgba(255, 255, 255, 0.1); outline: none; }
        .modal-body {
            padding: 24px; overflow-y: auto; font-size: 1rem; line-height: 1.6; color: #374151;
        }
        .modal-body table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        .modal-body th, .modal-body td { border: 1px solid #E5E7EB; padding: 12px 16px; text-align: left; }
        .modal-body th { background: #F3F4F6; font-weight: 600; color: #111827; }
        .modal-body code { background: #F3F4F6; color: #1F2937; padding: 2px 6px; border-radius: 4px; font-size: 0.9rem; font-family: var(--font-mono); }
        .modal-body pre { background: #1F2937; color: #F3F4F6; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 16px 0; }
        .modal-body pre code { background: transparent; color: inherit; padding: 0; }
        .modal-body a { color: #2563EB; text-decoration: none; font-weight: 500; }
        .modal-body a:hover { text-decoration: underline; }

    </style>
</head>

# 常用 Skill 速查手册

按使用场景分类，快速找到你需要的 Skill。

---

| **baoyu-format-markdown**     | 提及"格式化 markdown"     | 自动添加 frontmatter、标题、列表、修复中英文混排 | `~/.agents/skills/baoyu-format-markdown/`     |

```

    </script>

    <script>
        const mdText = document.getElementById('markdown-content').textContent;
        const tokens = marked.lexer(mdText);
        const mainGrid = document.getElementById('mainGrid');
        
        // Modal state
        const modalDataMap = new Map();
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const modalCloseBtn = document.getElementById('modalClose');
        let previouslyFocusedElement = null;

        let currentSection = null;
        let currentSectionContent = null;
        let themeIndex = 0;

        // Utility: Highlight HTML safely
        function highlightHTML(html, query) {
            if (!query) return html;
            // Escape regex characters
            const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapedQuery})`, 'gi');
            
            const parts = html.split(/(<[^>]+>)/);
            for (let i = 0; i < parts.length; i++) {
                if (i % 2 === 0) {
                    parts[i] = parts[i].replace(regex, '<mark>$1</mark>');
                }
            }
            return parts.join('');
        }

        // Parse markdown tokens and build Masonry cards
        for (let i = 0; i < tokens.length; i++) {
            const token = tokens[i];
            
            if (token.type === 'heading' && token.depth === 2) {
                // Create Card Section
                currentSection = document.createElement('section');
                currentSection.className = 'section';
                // Rotate themes
                currentSection.style.borderTop = `4px solid var(--theme-${themeIndex % 10}-header)`;
                
                const header = document.createElement('div');
                header.className = 'section-header';
                header.innerHTML = marked.parseInline(token.text);
                header.dataset.originalHtml = header.innerHTML;
                header.style.backgroundColor = `var(--theme-${themeIndex % 10}-bg)`;
                header.style.color = `var(--theme-${themeIndex % 10}-header)`;
                
                currentSectionContent = document.createElement('div');
                currentSectionContent.className = 'section-content';
                
                currentSection.appendChild(header);
                currentSection.appendChild(currentSectionContent);
                mainGrid.appendChild(currentSection);
                
                themeIndex++;
            } 
            else if (token.type === 'heading' && token.depth === 3 && currentSectionContent) {
                // Subheader inside card
                const subheader = document.createElement('div');
                subheader.className = 'sub-header';
                subheader.innerHTML = marked.parseInline(token.text);
                subheader.dataset.originalHtml = subheader.innerHTML;
                currentSectionContent.appendChild(subheader);
            }
            else if (token.type === 'table' && currentSectionContent) {
                // Render table rows as extremely compact left-right items
                token.rows.forEach((row, rowIndex) => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'row';
                    
                    const nameCell = row[0].tokens[0] && row[0].tokens[0].type === 'strong' 
                        ? row[0].tokens[0].text : row[0].text;
                    const descText = row.length > 1 ? row[1].text : '';
                    
                    const btn = document.createElement('button');
                    btn.className = 'key clickable';
                    btn.innerHTML = marked.parseInline(nameCell);
                    btn.dataset.originalHtml = btn.innerHTML;
                    
                    const descSpan = document.createElement('span');
                    descSpan.className = 'desc';
                    descSpan.innerHTML = marked.parseInline(descText);
                    descSpan.dataset.originalHtml = descSpan.innerHTML;
                    
                    // Generate full HTML for modal
                    let modalHtml = '<table><thead><tr>';
                    token.header.forEach(h => modalHtml += `<th>${marked.parseInline(h.text)}</th>`);
                    modalHtml += '</tr></thead><tbody><tr>';
                    row.forEach(cell => modalHtml += `<td>${marked.parseInline(cell.text)}</td>`);
                    modalHtml += '</tr></tbody></table>';
                    
                    const modalId = `modal_${themeIndex}_${rowIndex}`;
                    modalDataMap.set(modalId, {
                        title: nameCell.replace(/<[^>]+>/g, ''), // Strip tags for title
                        content: modalHtml
                    });
                    
                    btn.onclick = () => openModal(modalId, btn);
                    
                    rowDiv.appendChild(btn);
                    rowDiv.appendChild(descSpan);
                    currentSectionContent.appendChild(rowDiv);
                });
            }
            else if (currentSectionContent && token.type !== 'space' && token.type !== 'hr') {
                if (token.type === 'code') {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'row';
                    
                    const btn = document.createElement('button');
                    btn.className = 'key clickable';
                    btn.textContent = "查看工作流代码";
                    btn.dataset.originalHtml = btn.textContent;
                    
                    const modalId = `modal_code_${themeIndex}_${i}`;
                    modalDataMap.set(modalId, {
                        title: '工作流详情',
                        content: `<pre><code>${token.text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`
                    });
                    btn.onclick = () => openModal(modalId, btn);
                    
                    rowDiv.appendChild(btn);
                    currentSectionContent.appendChild(rowDiv);
                } else if (token.type === 'paragraph') {
                    const p = document.createElement('p');
                    p.innerHTML = marked.parseInline(token.text);
                    p.dataset.originalHtml = p.innerHTML;
                    currentSectionContent.appendChild(p);
                }
            }
        }

        // Setup Empty State
        const emptyState = document.createElement('div');
        emptyState.className = 'empty-state';
        emptyState.innerHTML = `
            <div class="empty-icon">😵‍💫</div>
            <div class="empty-title">未找到匹配的 Skill</div>
            <p>请尝试更换关键词，或缩短搜索词</p>
        `;
        mainGrid.appendChild(emptyState);

        // Search Logic
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            let hasVisibleCards = false;

            const sections = document.querySelectorAll('.section');
            
            sections.forEach(section => {
                let hasVisibleContent = false;
                
                const sectionHeader = section.querySelector('.section-header');
                const sectionTitle = sectionHeader.textContent.toLowerCase();
                const sectionMatches = sectionTitle.includes(query);
                
                sectionHeader.innerHTML = highlightHTML(sectionHeader.dataset.originalHtml, query);
                
                const contentItems = section.querySelectorAll('.row, p, .sub-header');
                
                contentItems.forEach(item => {
                    if (item.classList.contains('sub-header')) {
                        item.innerHTML = highlightHTML(item.dataset.originalHtml, query);
                        return; // Handle sub-headers visibility below
                    }
                    
                    const text = item.textContent.toLowerCase();
                    const itemMatches = text.includes(query);
                    
                    if (sectionMatches || query === '' || itemMatches) {
                        item.classList.remove('hidden');
                        hasVisibleContent = true;
                        
                        // Apply highlights to all original children
                        const highlightableChildren = item.querySelectorAll('[data-original-html]');
                        if (highlightableChildren.length > 0) {
                            highlightableChildren.forEach(child => {
                                child.innerHTML = highlightHTML(child.dataset.originalHtml, query);
                            });
                        } else if (item.dataset.originalHtml) {
                            item.innerHTML = highlightHTML(item.dataset.originalHtml, query);
                        }
                    } else {
                        item.classList.add('hidden');
                    }
                });

                // Handle sub-headers visibility dynamically
                let currentSubHeader = null;
                let currentSubHeaderHasVisibleRows = false;
                
                contentItems.forEach(item => {
                    if (item.classList.contains('sub-header')) {
                        if (currentSubHeader) {
                            currentSubHeader.classList.toggle('hidden', !currentSubHeaderHasVisibleRows);
                        }
                        currentSubHeader = item;
                        currentSubHeaderHasVisibleRows = false;
                    } else if (!item.classList.contains('hidden')) {
                        currentSubHeaderHasVisibleRows = true;
                    }
                });
                
                if (currentSubHeader) {
                    currentSubHeader.classList.toggle('hidden', !currentSubHeaderHasVisibleRows);
                }

                if (hasVisibleContent || sectionMatches) {
                    section.classList.remove('hidden');
                    hasVisibleCards = true;
                    
                    // Unhide all items inside if the section header itself matched
                    if (sectionMatches && query !== '') {
                        contentItems.forEach(item => {
                            item.classList.remove('hidden');
                            const highlightableChildren = item.querySelectorAll('[data-original-html]');
                            if (highlightableChildren.length > 0) {
                                highlightableChildren.forEach(child => {
                                    child.innerHTML = highlightHTML(child.dataset.originalHtml, query);
                                });
                            } else if (item.dataset.originalHtml) {
                                item.innerHTML = highlightHTML(item.dataset.originalHtml, query);
                            }
                        });
                    }
                } else {
                    section.classList.add('hidden');
                }
            });

            emptyState.classList.toggle('active', !hasVisibleCards && query !== '');
        });

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput && !modalOverlay.classList.contains('active')) {
                e.preventDefault();
                searchInput.focus();
            } else if (e.key === 'Escape') {
                if (modalOverlay.classList.contains('active')) {
                    closeModal();
                } else if (document.activeElement === searchInput) {
                    if (searchInput.value) {
                        searchInput.value = '';
                        searchInput.dispatchEvent(new Event('input'));
                    } else {
                        searchInput.blur();
                    }
                }
            }
        });

        // Modal Logic
        function openModal(id, triggerElement) {
            const data = modalDataMap.get(id);
            if (!data) return;
            
            previouslyFocusedElement = triggerElement;
            modalTitle.textContent = data.title;
            modalBody.innerHTML = data.content;
            
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // Set focus to the modal body for accessibility
            setTimeout(() => modalBody.focus(), 50);
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
            
            if (previouslyFocusedElement) {
                previouslyFocusedElement.focus();
            }
        }

        modalCloseBtn.onclick = closeModal;
        modalOverlay.onclick = (e) => {
            if (e.target === modalOverlay) closeModal();
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
